<svg width="140" height="40" viewBox="0 0 140 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Pixiu 2.0 Container Platform Logo — Dark Mode (for light backgrounds) -->
  <!-- Icon: Stylized Pixiu creature head inside hexagonal container geometry -->
  <g transform="translate(0, 2)">
    <!-- Main hexagon container shape -->
    <path d="M18 1L33 9V25L18 33L3 25V9L18 1Z" fill="#0F172A" stroke="#0F172A" stroke-width="1"/>
    <!-- Inner hexagon highlight -->
    <path d="M18 5L29 11V23L18 29L7 23V11L18 5Z" fill="#06B6D4" opacity="0.15"/>
    <!-- Pixiu head / letter P stylization -->
    <path d="M12 10L12 24H15V17H19C21.8 17 24 14.8 24 12C24 9.2 21.8 7 19 7H12V10ZM15 10H19C20.1 10 21 10.9 21 12C21 13.1 20.1 14 19 14H15V10Z" fill="#06B6D4"/>
    <!-- Wing / speed element (upper right) -->
    <path d="M22 7L30 3L26 11L22 7Z" fill="#06B6D4"/>
    <!-- Ear / horn element (top left) -->
    <path d="M10 7L6 3L12 5L10 7Z" fill="#F59E0B"/>
    <!-- Eye accent (gold) -->
    <circle cx="17" cy="12" r="1.5" fill="#F59E0B"/>
    <!-- Lower jaw / container bar -->
    <rect x="12" y="20" width="10" height="3" rx="0.5" fill="#06B6D4" opacity="0.6"/>
    <!-- Tech detail lines inside hexagon -->
    <rect x="20" y="18" width="3" height="6" rx="0.3" fill="#06B6D4" opacity="0.35"/>
    <rect x="24" y="20" width="3" height="5" rx="0.3" fill="#06B6D4" opacity="0.2"/>
  </g>
  <!-- Wordmark: pixiu -->
  <g transform="translate(40, 26)" fill="#0F172A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="20" letter-spacing="-0.02em">
    <text x="0" y="0">pixiu</text>
  </g>
</svg>
